<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplesmente oumente e diminua o tamanho do seu navegador.
    </p>

    <picture>
          <source media="(max-width: 750px)" srcset="foto-p.png" type="image/png">
         <source media="(max-width: 1000px)" srcset="foto-m.png" type="image/png">
        <img src="foto-g.png" alt="Imagem Flexivel">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos reproduzir áudio em HTML</p>
    <audio src="brave.mp3" controls autoplay></audio>
    
</body>
</html>
