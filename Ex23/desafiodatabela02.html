<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tabela de Notas</title>
<style>
  body {
    font-family: Arial, sans-serif;
  }
  table {
    border-collapse: collapse;
    width: 600px;
    margin: 20px auto;
  }
  th, td {
    border: 1px solid #999;
    padding: 8px;
    text-align: center;
  }
  th {
    background-color: #444;
    color: white;
  }
  .sub-header {
    background-color: #666;
    color: white;
  }
  .area {
    background-color: #e6e6e6;
    font-weight: bold;
  }
  .media {
    background-color: #ddd;
    font-weight: bold;
    text-align: left;
  }
</style>
</head>
<body>

<table>
  <tr>
    <th rowspan="2">Área</th>
    <th rowspan="2">Disciplinas</th>
    <th colspan="2">Notas</th>
    <th rowspan="2">Média</th>
  </tr>
  <tr class="sub-header">
    <th>Nota 1</th>
    <th>Nota 2</th>
  </tr>

  <!-- Exatas -->
  <tr>
    <td class="area" rowspan="4">Exatas</td>
    <td>Matemática</td>
    <td>0.0</td>
    <td>0.0</td>
    <td>0.0</td>
  </tr>
  <tr>
    <td>Física</td>
    <td>0.0</td>
    <td>0.0</td>
    <td>0.0</td>
  </tr>
  <tr>
    <td>Química</td>
    <td>0.0</td>
    <td>0.0</td>
    <td>0.0</td>
  </tr>
  <tr>
    <td>Biologia</td>
    <td>0.0</td>
    <td>0.0</td>
    <td>0.0</td>
  </tr>

  <tr class="media">
    <td colspan="4">Média de Exatas</td>
    <td>0.0</td>
  </tr>

  <!-- Humanas -->
  <tr>
    <td class="area" rowspan="2">Humanas</td>
    <td>História</td>
    <td>0.0</td>
    <td>0.0</td>
    <td>0.0</td>
  </tr>
  <tr>
    <td>Geografia</td>
    <td>0.0</td>
    <td>0.0</td>
    <td>0.0</td>
  </tr>

  <tr class="media">
    <td colspan="4">Média de Humanas</td>
    <td>0.0</td>
  </tr>

</table>

</body>
</html>
