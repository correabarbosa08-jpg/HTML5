<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: azure;
            height: 300px;
            width: 300px; 

            border: 5px solid rgb(10, 10, 112);

            padding: 10px 10px 10px;

            margin: 20px auto 40px auto;

        }

        a {
            border-width: 5px;
            border-style: double;
            border-color: rgb(10, 10, 112);
            
            padding: 5px;
            
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos também são box-level e os <a href="#">links são caixas inline-level</a></p>
    
</body>
</html>
