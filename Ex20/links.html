<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-size: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: blue;
            text-decoration: underline;
        }

        a::after {
            content: ' [link] ';
            text-decoration: none;
            font-weight: normal;
            color: dark gray;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="http://gustavoguanabara.github.io"
            target="_blank">Repositório Github</a></li>
        <li><a href="http://youtube.com/cursoemvideo/"
            target="_blank">Canal do YouTube</a></li>
        <li><a href="http://www.cursoemvideo.com"
            target="_blank">Site do Cursoemvideo</a></li>
    </ul>
    
</body>
</html>
